services:
  web:
    build: .
    restart: unless-stopped
    networks:
      - dofamy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - dofamy

networks:
  dofamy:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
