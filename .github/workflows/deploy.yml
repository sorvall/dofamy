# Деплой Dofamy PWA на VPS: сборка web → архив → SCP → docker compose (nginx + Caddy).
#
# Секреты GitHub (Settings → Secrets and variables → Actions):
#   SERVER_HOST     — IP или домен сервера
#   SERVER_USER     — пользователь SSH (например root или deploy)
#   SSH_PASSWORD    — пароль SSH (если вход по паролю)
#   SSH_PRIVATE_KEY — приватный SSH-ключ целиком (если вход по ключу; предпочтительно)
#   DEPLOY_PATH     — каталог на сервере, например /root/dofamy (опционально, по умолчанию /root/dofamy)
#
# Опционально:
#   SSH_PORT        — порт SSH, если не 22
#
# Сборка (EXPO_PUBLIC_* — попадают в бандл на этапе CI):
#   EXPO_PUBLIC_YANDEX_SPEECHKIT_API_KEY
#   EXPO_PUBLIC_YANDEX_FOLDER_ID
#   EXPO_PUBLIC_DEEPSEEK_API_KEY
#   EXPO_PUBLIC_YANDEX_IAM_TOKEN
#
# На сервере один раз: Docker + docker compose plugin.
# В DEPLOY_PATH положите .env (не в git) с:
#   SITE_DOMAIN=dofamy.example.com

name: Build and Deploy Dofamy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SSH_PORT_DEPLOY: ${{ secrets.SSH_PORT }}
      # Проверка через env — безопаснее для паролей со спецсимволами
      SECRET_SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SECRET_SERVER_USER: ${{ secrets.SERVER_USER }}
      SECRET_SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      SECRET_SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SECRET_DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Verify deployment secrets
        run: |
          set -euo pipefail
          missing=""
          [ -z "${SECRET_SERVER_HOST:-}" ] && missing="${missing} SERVER_HOST"
          [ -z "${SECRET_SERVER_USER:-}" ] && missing="${missing} SERVER_USER"
          if [ -z "${SECRET_SSH_PASSWORD:-}" ] && [ -z "${SECRET_SSH_PRIVATE_KEY:-}" ]; then
            missing="${missing} SSH_PASSWORD или SSH_PRIVATE_KEY"
          fi
          if [ -n "${missing}" ]; then
            echo "::error::Не заданы repository secrets:${missing}"
            echo "::error::GitHub → Settings → Secrets and variables → Actions → вкладка Secrets (не Variables)."
            exit 1
          fi
          if [ -n "${SECRET_SSH_PRIVATE_KEY:-}" ]; then
            echo "::notice::SSH: будет использован SSH_PRIVATE_KEY"
          else
            echo "::notice::SSH: будет использован SSH_PASSWORD (на многих VPS пароль отключён — лучше ключ)"
          fi
          if [ -z "${SECRET_DEPLOY_PATH:-}" ]; then
            echo "::notice::DEPLOY_PATH не задан — используем /root/dofamy"
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web (PWA)
        env:
          EXPO_PUBLIC_YANDEX_SPEECHKIT_API_KEY: ${{ secrets.EXPO_PUBLIC_YANDEX_SPEECHKIT_API_KEY }}
          EXPO_PUBLIC_YANDEX_FOLDER_ID: ${{ secrets.EXPO_PUBLIC_YANDEX_FOLDER_ID }}
          EXPO_PUBLIC_DEEPSEEK_API_KEY: ${{ secrets.EXPO_PUBLIC_DEEPSEEK_API_KEY }}
          EXPO_PUBLIC_YANDEX_IAM_TOKEN: ${{ secrets.EXPO_PUBLIC_YANDEX_IAM_TOKEN }}
        run: npm run build:web

      - name: Create deployment archive
        run: |
          set -euo pipefail
          ARCHIVE_PATH="/tmp/dofamy-deploy-${GITHUB_RUN_ID}.tgz"
          tar -czf "${ARCHIVE_PATH}" \
            dist \
            Dockerfile \
            docker-compose.yml \
            nginx.conf \
            Caddyfile \
            .env.example
          mv "${ARCHIVE_PATH}" dofamy-deploy.tgz

      - name: Install SSH tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openssh-client sshpass

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          if [ -n "${SSH_PRIVATE_KEY}" ]; then
            printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            echo "SSH key loaded ($(wc -l < ~/.ssh/deploy_key) lines)"
          fi
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_PORT: ${{ env.SSH_PORT_DEPLOY != '' && env.SSH_PORT_DEPLOY || 22 }}
        run: |
          set -euo pipefail
          target="${SERVER_USER}@${SERVER_HOST}"
          if [ -f ~/.ssh/deploy_key ]; then
            echo "Trying key auth → ${target}:${SSH_PORT}"
            ssh -i ~/.ssh/deploy_key -p "${SSH_PORT}" -o BatchMode=yes -o IdentitiesOnly=yes \
              "${target}" "echo OK: connected as \$(whoami)@\$(hostname)"
          else
            echo "Trying password auth → ${target}:${SSH_PORT}"
            SSHPASS="${SSH_PASSWORD}" sshpass -e ssh -p "${SSH_PORT}" \
              -o PreferredAuthentications=password -o PubkeyAuthentication=no \
              -o StrictHostKeyChecking=yes \
              "${target}" "echo OK: connected as \$(whoami)@\$(hostname)"
          fi

      - name: Ensure deploy directory exists
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/root/dofamy' }}
          SSH_PORT: ${{ env.SSH_PORT_DEPLOY != '' && env.SSH_PORT_DEPLOY || 22 }}
        run: |
          set -euo pipefail
          target="${SERVER_USER}@${SERVER_HOST}"
          if [ -f ~/.ssh/deploy_key ]; then
            ssh -i ~/.ssh/deploy_key -p "${SSH_PORT}" -o BatchMode=yes -o IdentitiesOnly=yes \
              "${target}" "mkdir -p '${DEPLOY_PATH}'"
          else
            SSHPASS="${SSH_PASSWORD}" sshpass -e ssh -p "${SSH_PORT}" \
              -o PreferredAuthentications=password -o PubkeyAuthentication=no \
              "${target}" "mkdir -p '${DEPLOY_PATH}'"
          fi

      - name: Copy archive to remote server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/root/dofamy' }}
          SSH_PORT: ${{ env.SSH_PORT_DEPLOY != '' && env.SSH_PORT_DEPLOY || 22 }}
        run: |
          set -euo pipefail
          target="${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/dofamy-deploy.tgz"
          if [ -f ~/.ssh/deploy_key ]; then
            scp -i ~/.ssh/deploy_key -P "${SSH_PORT}" -o BatchMode=yes -o IdentitiesOnly=yes \
              dofamy-deploy.tgz "${target}"
          else
            SSHPASS="${SSH_PASSWORD}" sshpass -e scp -P "${SSH_PORT}" \
              -o PreferredAuthentications=password -o PubkeyAuthentication=no \
              dofamy-deploy.tgz "${target}"
          fi

      - name: Extract and run Docker Compose
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/root/dofamy' }}
          SSH_PORT: ${{ env.SSH_PORT_DEPLOY != '' && env.SSH_PORT_DEPLOY || 22 }}
        run: |
          set -euo pipefail
          target="${SERVER_USER}@${SERVER_HOST}"
          remote_script="$(cat <<'REMOTE'
          set -euo pipefail
          DEPLOY_PATH="$1"
          cd "$DEPLOY_PATH"
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.env' \
            ! -name 'dofamy-deploy.tgz' \
            -exec rm -rf {} +
          tar xzf dofamy-deploy.tgz
          rm -f dofamy-deploy.tgz

          if [ ! -f .env ]; then
            echo "::error::.env not found in $1. Create $1/.env on server with SITE_DOMAIN=..."
            exit 1
          fi

          if ! command -v docker >/dev/null 2>&1; then
            curl -fsSL https://get.docker.com | sh
          fi

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD="docker-compose"
          else
            echo "::error::Docker Compose is not available on server."
            exit 1
          fi

          $COMPOSE_CMD up -d --build
          $COMPOSE_CMD restart caddy
          $COMPOSE_CMD ps
          REMOTE
          )"
          if [ -f ~/.ssh/deploy_key ]; then
            ssh -i ~/.ssh/deploy_key -p "${SSH_PORT}" -o BatchMode=yes -o IdentitiesOnly=yes \
              "${target}" "bash -s -- '${DEPLOY_PATH}'" <<< "${remote_script}"
          else
            SSHPASS="${SSH_PASSWORD}" sshpass -e ssh -p "${SSH_PORT}" \
              -o PreferredAuthentications=password -o PubkeyAuthentication=no \
              "${target}" "bash -s -- '${DEPLOY_PATH}'" <<< "${remote_script}"
          fi
