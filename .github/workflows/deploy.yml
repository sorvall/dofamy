# Деплой Dofamy PWA на VPS: сборка web → архив → SCP → docker compose (nginx + Caddy).
#
# Секреты GitHub (Settings → Secrets and variables → Actions):
#   SERVER_HOST     — IP или домен сервера
#   SERVER_USER     — пользователь SSH (например root или deploy)
#   SSH_PASSWORD    — пароль SSH
#   DEPLOY_PATH     — каталог на сервере (опционально, по умолчанию /root/dofamy)
#
#   SITE_DOMAIN     — домен для Caddy (опционально; иначе SERVER_HOST)
#   SSH_PORT        — порт SSH, если не 22
#
# Сборка (EXPO_PUBLIC_* — попадают в бандл на этапе CI):
#   EXPO_PUBLIC_YANDEX_SPEECHKIT_API_KEY
#   EXPO_PUBLIC_YANDEX_FOLDER_ID
#   EXPO_PUBLIC_DEEPSEEK_API_KEY
#   EXPO_PUBLIC_YANDEX_IAM_TOKEN
#
# На сервере: Docker + docker compose. .env создаётся автоматически при первом деплое.

name: Build and Deploy Dofamy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SSH_PORT_DEPLOY: ${{ secrets.SSH_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/root/dofamy' }}

    steps:
      - name: Verify deployment secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -euo pipefail
          missing=""
          [ -z "${SERVER_HOST}" ] && missing="${missing} SERVER_HOST"
          [ -z "${SERVER_USER}" ] && missing="${missing} SERVER_USER"
          [ -z "${SSH_PASSWORD}" ] && missing="${missing} SSH_PASSWORD"
          if [ -n "${missing}" ]; then
            echo "::error::Задайте секреты репозитория:${missing}"
            echo "::error::Скопируйте из urbanscore: scripts/gh-set-deploy-secrets.sh (см. .env.deploy.example)"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "::notice::DEPLOY_PATH не задан — используем /root/dofamy"
          fi
          echo "SERVER_USER=${SERVER_USER}"
          echo "SERVER_HOST длина: ${#SERVER_HOST} символов"
          echo "SSH_PASSWORD длина: ${#SSH_PASSWORD} символов"
          if [ "${#SSH_PASSWORD}" -lt 4 ]; then
            echo "::warning::SSH_PASSWORD слишком короткий — возможно, секрет задан неверно"
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web (PWA)
        env:
          EXPO_PUBLIC_YANDEX_SPEECHKIT_API_KEY: ${{ secrets.EXPO_PUBLIC_YANDEX_SPEECHKIT_API_KEY }}
          EXPO_PUBLIC_YANDEX_FOLDER_ID: ${{ secrets.EXPO_PUBLIC_YANDEX_FOLDER_ID }}
          EXPO_PUBLIC_DEEPSEEK_API_KEY: ${{ secrets.EXPO_PUBLIC_DEEPSEEK_API_KEY }}
          EXPO_PUBLIC_YANDEX_IAM_TOKEN: ${{ secrets.EXPO_PUBLIC_YANDEX_IAM_TOKEN }}
        run: npm run build:web

      - name: Create deployment archive
        run: |
          set -euo pipefail
          ARCHIVE_PATH="/tmp/dofamy-deploy-${GITHUB_RUN_ID}.tgz"
          tar -czf "${ARCHIVE_PATH}" \
            dist \
            Dockerfile \
            docker-compose.yml \
            nginx.conf \
            Caddyfile \
            Caddyfile.ip \
            .env.example
          mv "${ARCHIVE_PATH}" dofamy-deploy.tgz

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT_DEPLOY != '' && env.SSH_PORT_DEPLOY || 22 }}
          script: mkdir -p '${{ env.DEPLOY_PATH }}'

      - name: Copy archive to remote server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT_DEPLOY != '' && env.SSH_PORT_DEPLOY || 22 }}
          source: "dofamy-deploy.tgz"
          target: ${{ env.DEPLOY_PATH }}

      - name: Extract and run Docker Compose
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ env.SSH_PORT_DEPLOY != '' && env.SSH_PORT_DEPLOY || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH='${{ env.DEPLOY_PATH }}'
            test -n "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            find . -mindepth 1 -maxdepth 1 \
              ! -name '.env' \
              ! -name 'dofamy-deploy.tgz' \
              -exec rm -rf {} +
            tar xzf dofamy-deploy.tgz
            rm -f dofamy-deploy.tgz

            if [ ! -f .env ]; then
              echo "WEB_PORT=8082" > .env
              echo "HTTPS_PORT=8443" >> .env
              echo "::notice::Создан ${DEPLOY_PATH}/.env (WEB_PORT=8082, HTTPS_PORT=8443)"
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing via get.docker.com..."
              if command -v curl >/dev/null 2>&1; then
                curl -fsSL https://get.docker.com | sh
              elif command -v wget >/dev/null 2>&1; then
                wget -qO- https://get.docker.com | sh
              else
                echo "::error::Neither curl nor wget is available to install Docker."
                exit 1
              fi
            fi

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "::error::Docker Compose is not available on server."
              exit 1
            fi

            $COMPOSE_CMD down --remove-orphans 2>/dev/null || true
            $COMPOSE_CMD up -d --build
            $COMPOSE_CMD ps
            echo "::notice::Dofamy HTTP:  http://${{ secrets.SERVER_HOST }}:8082"
            echo "::notice::Dofamy HTTPS: https://${{ secrets.SERVER_HOST }}:8443 (self-signed, для микрофона)"
