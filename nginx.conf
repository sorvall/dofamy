server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # SpeechKit: в браузере нет CORS на stt.api.cloud.yandex.net — прокси с того же origin
    location = /api/stt/recognize {
        client_max_body_size 2m;
        proxy_pass https://stt.api.cloud.yandex.net/speech/v1/stt:recognize$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header Host stt.api.cloud.yandex.net;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        proxy_request_buffering on;
    }
}
